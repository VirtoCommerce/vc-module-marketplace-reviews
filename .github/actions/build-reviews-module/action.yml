# v2.0.0
name: Build Reviews Module

runs:
  using: composite

  steps:

    - name: Install dependencies for Reviews Module
      shell: bash
      working-directory: src/VirtoCommerce.MarketplaceReviewsModule.Web/reviews-app
      run: yarn

    - name: Compile API client (produces src/api_client/dist consumed by exports)
      shell: bash
      working-directory: src/VirtoCommerce.MarketplaceReviewsModule.Web/reviews-app/src/api_client
      run: npx tsc

    - name: Build Reviews Module
      shell: bash
      working-directory:  src/VirtoCommerce.MarketplaceReviewsModule.Web/reviews-app
      run: yarn build:modules-bundle
